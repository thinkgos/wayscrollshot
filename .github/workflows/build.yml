name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: wayscrollshot-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: wayscrollshot-linux-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/wayscrollshot

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: wayscrollshot-linux-x86_64
          path: ./release/x86_64

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: wayscrollshot-linux-aarch64
          path: ./release/aarch64

      - name: Create release archives
        run: |
          cd release/x86_64
          chmod +x wayscrollshot
          tar -czvf ../wayscrollshot-linux-x86_64.tar.gz wayscrollshot
          cd ../aarch64
          chmod +x wayscrollshot
          tar -czvf ../wayscrollshot-linux-aarch64.tar.gz wayscrollshot

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/wayscrollshot-linux-x86_64.tar.gz
            release/wayscrollshot-linux-aarch64.tar.gz
          generate_release_notes: true
